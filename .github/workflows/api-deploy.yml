name: Deploy API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        run: go build -o sewagedata-api ./api/

      - name: Copy binary to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "sewagedata-api"
          target: "/etc/sewagedata-api/tmp/"

      - name: Restart systemd service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            mv /etc/sewagedata-api/tmp/sewagedata-api /etc/sewagedata-api/sewagedata-api.new
            chmod +x /etc/sewagedata-api/sewagedata-api.new
            mv /etc/sewagedata-api/sewagedata-api.new /etc/sewagedata-api/sewagedata-api
            systemctl restart sewagedata-api
            systemctl is-active --quiet sewagedata-api && echo "Service is running" || echo "Service FAILED to start"
